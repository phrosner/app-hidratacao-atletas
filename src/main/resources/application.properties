# ========================================
# CONFIGURAÇÕES DA APLICAÇÃO HIDRATRACK
# ========================================

spring.application.name=HidraTrack

# ========================================
# CONFIGURAÇÕES DO BANCO DE DADOS - MySQL
# ========================================

# URL de conexão - ajuste localhost, porta e nome do banco conforme seu ambiente
spring.datasource.url=jdbc:mysql://localhost:3306/hidratrack_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true

# Credenciais do banco - ALTERE para suas credenciais
spring.datasource.username=root
spring.datasource.password=

# Driver JDBC do MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================================
# CONFIGURAÇÕES DO JPA/HIBERNATE
# ========================================

# Estratégia de geração do schema
# update: atualiza o schema automaticamente (desenvolvimento)
# validate: apenas valida o schema (produção)
# create: recria o schema a cada inicialização (testes)
# create-drop: cria e destroi ao finalizar (testes)
spring.jpa.hibernate.ddl-auto=update

# Dialeto do MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Exibir SQL no console (útil para debug)
spring.jpa.show-sql=true

# Formatar SQL exibido (melhor legibilidade)
spring.jpa.properties.hibernate.format_sql=true

# Exibir bind parameters no log
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Estratégia de nomeação de tabelas e colunas
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Charset e encoding
spring.jpa.properties.hibernate.jdbc.charset=UTF-8
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

# ========================================
# CONFIGURAÇÕES DO POOL DE CONEXÕES (HikariCP)
# ========================================

# Tamanho máximo do pool de conexões
spring.datasource.hikari.maximum-pool-size=10

# Tamanho mínimo do pool
spring.datasource.hikari.minimum-idle=5

# Timeout de conexão (ms)
spring.datasource.hikari.connection-timeout=30000

# Tempo máximo de vida de uma conexão (ms)
spring.datasource.hikari.max-lifetime=1800000

# Tempo de idle antes de fechar conexão (ms)
spring.datasource.hikari.idle-timeout=600000

# ========================================
# CONFIGURAÇÕES DO SERVIDOR
# ========================================

# Porta do servidor
server.port=8080

# Context path da aplicação
server.servlet.context-path=/api

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ========================================
# CONFIGURAÇÕES DE VALIDAÇÃO
# ========================================

# Habilitar validação de beans
spring.jpa.properties.javax.persistence.validation.mode=auto

# ========================================
# CONFIGURAÇÕES DE LOG
# ========================================

# Nível de log da aplicação
logging.level.br.com.hidratrack=DEBUG

# Nível de log do Spring
logging.level.org.springframework.web=INFO

# Nível de log do Hibernate
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type=TRACE

# Pattern de log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ========================================
# CONFIGURAÇÕES DE PRODUÇÃO (comentadas)
# ========================================

# Descomente e ajuste para produção:
